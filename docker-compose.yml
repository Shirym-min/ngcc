version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-ngcc_session}
      SESSION_SECRET: ${SESSION_SECRET}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
